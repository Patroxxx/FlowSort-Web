<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowSort — Acceso Seguro</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <nav class="nav">
      <a class="brand" href="../">
        <img src="../assets/flowsort-logo.png" />FlowSort
      </a>
      <div class="nav-right">
        <div class="lang-selector">
          <button class="lang-btn" id="lang-btn">
            <span class="lang-flag">🇺🇸</span>
            <span class="lang-code">EN</span>
          </button>
          <div class="lang-dropdown" id="lang-dropdown">
            <button class="lang-option" data-lang="en">
              <span class="lang-flag">🇺🇸</span> English
            </button>
            <button class="lang-option" data-lang="es">
              <span class="lang-flag">🇪🇸</span> Español
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="auth-container">
      <div class="auth-login-wrap">
        <!-- Sección Pública: Botón de Login -->
        <div id="seccion-publica">
          <div class="logo-container">
            <img
              src="../assets/flowsort-logo.png"
              class="logo"
              alt="FlowSort"
            />
          </div>
          <h1 data-i18n="login.title">Acceso a FlowSort</h1>
          <p class="subtitle" data-i18n="login.subtitle">
            Inicia sesión para descifrar y acceder a tu workspace de proyectos.
          </p>

          <!-- Spinner de carga durante el login popup -->
          <div id="loader" class="loading-spinner"></div>

          <!-- Botón de Inicio con Gmail (inhabilitado por defecto en gris) -->
          <button id="google-login-btn" class="btn-google" disabled>
            <svg viewBox="0 0 24 24" width="100%" height="100%">
              <path
                fill="#4285F4"
                d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.69c-.29 1.5-1.14 2.78-2.4 3.62v3.02h3.87c2.26-2.08 3.58-5.14 3.58-8.49z"
              />
              <path
                fill="#34A853"
                d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.87-3.02c-1.08.72-2.45 1.16-4.06 1.16-3.11 0-5.74-2.11-6.68-4.96H1.21v3.11C3.18 21.88 7.39 24 12 24z"
              />
              <path
                fill="#FBBC05"
                d="M5.32 14.27c-.24-.72-.38-1.49-.38-2.27s.14-1.55.38-2.27V6.62H1.21C.44 8.24 0 10.06 0 12s.44 3.76 1.21 5.38l4.11-3.11z"
              />
              <path
                fill="#EA4335"
                d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.39 0 3.18 2.12 1.21 5.38l4.11 3.11c.94-2.85 3.57-4.96 6.68-4.96z"
              />
            </svg>
            <span data-i18n="login.btn">Iniciar sesión con Gmail</span>
          </button>
        </div>

        <!-- Sección Privada Protegida -->
        <div id="area-privada">
          <div class="user-badge" data-i18n="login.badge">Sesión iniciada</div>
          <h1 id="welcome-msg">¡Bienvenido!</h1>
          <p
            class="subtitle"
            style="margin-bottom: 10px"
            data-i18n="login.authenticated"
          >
            Tu sesión está autenticada mediante Google.
          </p>
        </div>
      </div>
    </main>

    <footer>
      <span>© 2026 FlowSort</span>
      <span data-i18n="footer.tagline">Sort. Advance. Do it on FlowSort.</span>
    </footer>

    <!-- Firebase SDK v10+ y Lógica de Autenticación -->
    <script type="module">
      // Importamos los módulos necesarios directamente de la CDN de Firebase
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // Configuración de Firebase del Proyecto
      const firebaseConfig = {
        apiKey: "AIzaSyBeH4fm9pEHszy61udCItivYuztILMooKo",
        authDomain: "flowsort-3b6f7.firebaseapp.com",
        projectId: "flowsort-3b6f7",
        storageBucket: "flowsort-3b6f7.firebasestorage.app",
        messagingSenderId: "168059141026",
        appId: "1:168059141026:web:321443846637f586da90fb",
      };

      // Inicializamos la aplicación de Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      // Referencias a los elementos del DOM
      const seccionPublica = document.getElementById("seccion-publica");
      const areaPrivada = document.getElementById("area-privada");
      const loginBtn = document.getElementById("google-login-btn");
      const welcomeMsg = document.getElementById("welcome-msg");
      const loader = document.getElementById("loader");

      // Función para iniciar sesión con Popup
      loginBtn.addEventListener("click", () => {
        loader.style.display = "block";
        loginBtn.style.display = "none";

        signInWithPopup(auth, provider)
          .then((result) => {})
          .catch((error) => {
            console.error("Error al iniciar sesión con Google:", error);
            alert("No se pudo iniciar sesión: " + error.message);
            loader.style.display = "none";
            loginBtn.style.display = "flex";
          });
      });

      // Observador de Estado de Autenticación
      onAuthStateChanged(auth, (user) => {
        loader.style.display = "none";
        loginBtn.removeAttribute("disabled");

        if (user) {
          welcomeMsg.setAttribute("data-i18n", "login.redirecting");
          const lang = document.documentElement.lang || "en";
          const t = translations[lang] || translations["en"];
          welcomeMsg.innerHTML = t["login.redirecting"];
          seccionPublica.style.display = "none";
          areaPrivada.style.display = "flex";
        } else {
          welcomeMsg.removeAttribute("data-i18n");
          welcomeMsg.textContent = "";
          seccionPublica.style.display = "block";
          loginBtn.style.display = "flex";
          areaPrivada.style.display = "none";
        }
      });

      // ── Language Selector ──────────────────────────────────────────────────
      const translations = {
        en: {
          "login.title": "Access FlowSort",
          "login.subtitle":
            "Sign in to decrypt and access your project workspace.",
          "login.btn": "Sign in with Gmail",
          "login.badge": "Success",
          "login.authenticated": "Your session is authenticated via Google.",
          "login.redirecting": "Redirecting...",
          "footer.tagline": "Sort. Advance. Do it on FlowSort.",
        },
        es: {
          "login.title": "Acceso a FlowSort",
          "login.subtitle":
            "Inicia sesión para descifrar y acceder a tu workspace de proyectos.",
          "login.btn": "Iniciar sesión con Gmail",
          "login.badge": "Éxito",
          "login.authenticated": "Tu sesión está autenticada mediante Google.",
          "login.redirecting": "Redireccionándote...",
          "footer.tagline": "Sort. Avanza. Hazlo en FlowSort.",
        },
      };

      const langBtn = document.getElementById("lang-btn");
      const langDropdown = document.getElementById("lang-dropdown");
      const langOptions = document.querySelectorAll(".lang-option");

      function setLanguage(lang) {
        document.documentElement.lang = lang;
        const t = translations[lang] || translations["en"];

        // Apply translations to all data-i18n elements
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (t[key]) el.innerHTML = t[key];
        });

        langBtn.querySelector(".lang-flag").textContent =
          lang === "es" ? "🇪🇸" : "🇺🇸";
        langBtn.querySelector(".lang-code").textContent = lang.toUpperCase();
        langOptions.forEach((opt) => {
          opt.classList.toggle(
            "selected",
            opt.getAttribute("data-lang") === lang,
          );
        });
        localStorage.setItem("preferred-lang", lang);
      }

      langBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        langDropdown.classList.toggle("show");
      });

      document.addEventListener("click", () =>
        langDropdown.classList.remove("show"),
      );

      langOptions.forEach((opt) => {
        opt.addEventListener("click", () => {
          const selectedLang = opt.getAttribute("data-lang");
          if (document.documentElement.lang === selectedLang) return;
          document.body.classList.add("lang-fade-out");
          setTimeout(() => {
            setLanguage(selectedLang);
            document.body.classList.remove("lang-fade-out");
            document.body.classList.add("lang-fade-in");
            setTimeout(
              () => document.body.classList.remove("lang-fade-in"),
              250,
            );
          }, 250);
        });
      });

      setLanguage(localStorage.getItem("preferred-lang") || "en");

      // Page Transition Interceptor
      document.querySelectorAll("a").forEach((link) => {
        const href = link.getAttribute("href");
        if (
          !href ||
          href.startsWith("#") ||
          href.startsWith("javascript:") ||
          link.target === "_blank" ||
          href.includes("mailto:") ||
          href.includes("tel:")
        )
          return;

        try {
          const url = new URL(link.href, window.location.href);
          if (url.origin !== window.location.origin) return;
        } catch (e) {
          return;
        }

        link.addEventListener("click", (e) => {
          e.preventDefault();
          document.body.classList.add("page-exit");
          setTimeout(() => {
            window.location.href = href;
          }, 250);
        });
      });

      window.addEventListener("pageshow", (event) => {
        if (event.persisted) {
          document.body.classList.remove("page-exit");
        }
      });
    </script>
  </body>
</html>
